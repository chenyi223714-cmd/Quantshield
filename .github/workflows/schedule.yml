name: QuantShield Daily Worker

on:
  schedule:
    # 這是世界協調時 (UTC) 13:55，剛好是台灣時間 (UTC+8) 晚上 21:55
    - cron: '00 14 * * 1-5'
  workflow_dispatch:

jobs:
  run-quant-robot:
    runs-on: ubuntu-latest
    steps:
    - name: 檢查專案程式碼
      uses: actions/checkout@v3

    - name: 設定 Python 環境
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 安裝必要套件
      run: |
        python -m pip install --upgrade pip
        pip install requests pandas yfinance

    - name: 執行量化與新聞雙引擎腳本
      env:
        GMAIL_USER: ${{ secrets.GMAIL_USER }}
        GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
      run: python daily_quant_worker.py
